<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020810;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#050d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020810;stop-opacity:1" />
    </linearGradient>

    <!-- Monitor screen glow left -->
    <radialGradient id="screenGlowLeft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00C8FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00C8FF;stop-opacity:0" />
    </radialGradient>

    <!-- Monitor screen glow right -->
    <radialGradient id="screenGlowRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7B2FFF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7B2FFF;stop-opacity:0" />
    </radialGradient>

    <!-- Screen background left -->
    <linearGradient id="screenBgLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#010a14" />
      <stop offset="100%" style="stop-color:#021220" />
    </linearGradient>

    <!-- Screen background right -->
    <linearGradient id="screenBgRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0114" />
      <stop offset="100%" style="stop-color:#14022a" />
    </linearGradient>

    <!-- Brain pulse filter -->
    <filter id="brainGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip paths for screens -->
    <clipPath id="leftScreen">
      <rect x="72" y="52" width="326" height="200" rx="4"/>
    </clipPath>
    <clipPath id="rightScreen">
      <rect x="502" y="52" width="326" height="200" rx="4"/>
    </clipPath>

    <!-- Scanlines pattern -->
    <pattern id="scanlines" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,200,255,0.03)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bgGrad)"/>

  <!-- Ambient grid -->
  <g opacity="0.08">
    <line x1="0" y1="160" x2="900" y2="160" stroke="#00C8FF" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="320" stroke="#00C8FF" stroke-width="0.5"/>
  </g>

  <!-- === LEFT MONITOR === -->
  <!-- Monitor body -->
  <rect x="62" y="42" width="346" height="222" rx="10" fill="#0c1520" stroke="#1a3a5c" stroke-width="1.5"/>
  <!-- Screen bezel -->
  <rect x="72" y="52" width="326" height="200" rx="4" fill="url(#screenBgLeft)"/>
  <!-- Screen glow -->
  <rect x="72" y="52" width="326" height="200" rx="4" fill="url(#screenGlowLeft)"/>
  <!-- Scanlines overlay -->
  <rect x="72" y="52" width="326" height="200" rx="4" fill="url(#scanlines)" opacity="0.5"/>
  <!-- Monitor stand -->
  <rect x="218" y="264" width="44" height="18" rx="2" fill="#0c1520" stroke="#1a3a5c" stroke-width="1"/>
  <rect x="195" y="280" width="90" height="6" rx="3" fill="#0c1520" stroke="#1a3a5c" stroke-width="1"/>
  <!-- Monitor power LED -->
  <circle cx="235" cy="258" r="2" fill="#00C8FF" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- LEFT SCREEN CONTENT: AI BRAIN -->
  <g clip-path="url(#leftScreen)">
    <!-- Screen label -->
    <text x="235" y="75" text-anchor="middle" fill="#00C8FF" font-family="monospace" font-size="9" opacity="0.6">NEURAL NETWORK VISUALIZATION</text>

    <!-- Brain outline - stylized -->
    <g transform="translate(235, 152)" filter="url(#brainGlow)">
      <!-- Brain left hemisphere -->
      <path d="M-60,-40 C-80,-60 -90,-30 -85,-10 C-90,5 -80,25 -65,30 C-70,45 -55,55 -40,50 C-35,60 -20,62 -10,55 C-5,60 5,60 10,55 C0,65 0,65 0,65"
        fill="none" stroke="#00C8FF" stroke-width="1.5" opacity="0.7"/>
      <!-- Brain right hemisphere -->
      <path d="M60,-40 C80,-60 90,-30 85,-10 C90,5 80,25 65,30 C70,45 55,55 40,50 C35,60 20,62 10,55 C5,60 -5,60 -10,55 C0,65 0,65 0,65"
        fill="none" stroke="#00C8FF" stroke-width="1.5" opacity="0.7"/>
      <!-- Brain top curve -->
      <path d="M-60,-40 C-50,-75 50,-75 60,-40" fill="none" stroke="#00C8FF" stroke-width="1.5" opacity="0.7"/>
      <!-- Brain center divider -->
      <line x1="0" y1="-72" x2="0" y2="65" stroke="#00C8FF" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
      <!-- Brain folds left -->
      <path d="M-70,-20 C-60,-25 -50,-15 -55,0" fill="none" stroke="#00C8FF" stroke-width="1" opacity="0.5"/>
      <path d="M-75,5 C-65,0 -50,10 -55,25" fill="none" stroke="#00C8FF" stroke-width="1" opacity="0.5"/>
      <!-- Brain folds right -->
      <path d="M70,-20 C60,-25 50,-15 55,0" fill="none" stroke="#00C8FF" stroke-width="1" opacity="0.5"/>
      <path d="M75,5 C65,0 50,10 55,25" fill="none" stroke="#00C8FF" stroke-width="1" opacity="0.5"/>

      <!-- Neural nodes -->
      <circle cx="-40" cy="-20" r="3" fill="#00C8FF">
        <animate attributeName="r" values="3;5;3" dur="2.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.4;1" dur="2.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="-20" r="3" fill="#00C8FF">
        <animate attributeName="r" values="3;5;3" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-50" cy="15" r="2.5" fill="#00FFCC">
        <animate attributeName="r" values="2.5;4;2.5" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="50" cy="15" r="2.5" fill="#00FFCC">
        <animate attributeName="r" values="2.5;4;2.5" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="-10" r="3" fill="#7B2FFF">
        <animate attributeName="r" values="3;6;3" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-20" cy="30" r="2" fill="#00C8FF">
        <animate attributeName="r" values="2;3.5;2" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="20" cy="30" r="2" fill="#00C8FF">
        <animate attributeName="r" values="2;3.5;2" dur="2.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.7s" repeatCount="indefinite"/>
      </circle>

      <!-- Neural connections animated -->
      <line x1="-40" y1="-20" x2="0" y2="-10" stroke="#00C8FF" stroke-width="0.8" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.5s" repeatCount="indefinite"/>
      </line>
      <line x1="40" y1="-20" x2="0" y2="-10" stroke="#00C8FF" stroke-width="0.8" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.8s" repeatCount="indefinite"/>
      </line>
      <line x1="-50" y1="15" x2="-20" y2="30" stroke="#00FFCC" stroke-width="0.8" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.2s" repeatCount="indefinite"/>
      </line>
      <line x1="50" y1="15" x2="20" y2="30" stroke="#00FFCC" stroke-width="0.8" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
      </line>
      <line x1="-40" y1="-20" x2="-50" y2="15" stroke="#7B2FFF" stroke-width="0.8" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="40" y1="-20" x2="50" y2="15" stroke="#7B2FFF" stroke-width="0.8" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.8s" repeatCount="indefinite"/>
      </line>

      <!-- Pulse ring from center -->
      <circle cx="0" cy="-10" r="10" fill="none" stroke="#00C8FF" stroke-width="0.5">
        <animate attributeName="r" values="10;70;10" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
      </circle>

      <!-- Signal pulses along connections -->
      <circle r="2" fill="#ffffff">
        <animateMotion dur="1.5s" repeatCount="indefinite">
          <mpath href="#brainPath1"/>
        </animateMotion>
      </circle>
    </g>

    <!-- Invisible paths for motion -->
    <path id="brainPath1" d="M195,132 L235,142" fill="none"/>
  </g>

  <!-- === RIGHT MONITOR === -->
  <!-- Monitor body -->
  <rect x="492" y="42" width="346" height="222" rx="10" fill="#0c1520" stroke="#2a1a5c" stroke-width="1.5"/>
  <!-- Screen bezel -->
  <rect x="502" y="52" width="326" height="200" rx="4" fill="url(#screenBgRight)"/>
  <!-- Screen glow -->
  <rect x="502" y="52" width="326" height="200" rx="4" fill="url(#screenGlowRight)"/>
  <!-- Scanlines overlay -->
  <rect x="502" y="52" width="326" height="200" rx="4" fill="url(#scanlines)" opacity="0.5"/>
  <!-- Monitor stand -->
  <rect x="648" y="264" width="44" height="18" rx="2" fill="#0c1520" stroke="#2a1a5c" stroke-width="1"/>
  <rect x="625" y="280" width="90" height="6" rx="3" fill="#0c1520" stroke="#2a1a5c" stroke-width="1"/>
  <!-- Monitor power LED -->
  <circle cx="665" cy="258" r="2" fill="#7B2FFF" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- RIGHT SCREEN CONTENT: KNOWLEDGE GRAPH -->
  <g clip-path="url(#rightScreen)">
    <!-- Screen label -->
    <text x="665" y="75" text-anchor="middle" fill="#9B4FFF" font-family="monospace" font-size="9" opacity="0.6">KNOWLEDGE GRAPH — LIVE</text>

    <!-- Rotating knowledge graph -->
    <g transform="translate(665, 152)">
      <!-- Outer rotating ring -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
        <!-- Orbit ring -->
        <ellipse cx="0" cy="0" rx="85" ry="30" fill="none" stroke="#7B2FFF" stroke-width="0.5" opacity="0.3"/>
        <!-- Outer nodes on orbit -->
        <circle cx="85" cy="0" r="5" fill="#7B2FFF">
          <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="-85" cy="0" r="4" fill="#9B4FFF">
          <animate attributeName="r" values="4;6;4" dur="2.3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="42" cy="26" r="4" fill="#C840FF">
          <animate attributeName="r" values="4;6;4" dur="1.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="-42" cy="-26" r="4" fill="#7B2FFF">
          <animate attributeName="r" values="4;6;4" dur="2.7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="42" cy="-26" r="3.5" fill="#00C8FF">
          <animate attributeName="r" values="3.5;5;3.5" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="-42" cy="26" r="3.5" fill="#00FFCC">
          <animate attributeName="r" values="3.5;5;3.5" dur="2.1s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Middle rotating ring - opposite direction -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite"/>
        <ellipse cx="0" cy="0" rx="55" ry="22" fill="none" stroke="#9B4FFF" stroke-width="0.5" opacity="0.4"/>
        <circle cx="55" cy="0" r="5" fill="#00C8FF">
          <animate attributeName="r" values="5;8;5" dur="1.6s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0.5;1" dur="1.6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="-55" cy="0" r="5" fill="#C840FF">
          <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="27" cy="19" r="4" fill="#9B4FFF">
          <animate attributeName="r" values="4;6;4" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="-27" cy="-19" r="4" fill="#7B2FFF">
          <animate attributeName="r" values="4;6;4" dur="1.9s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Connections from center to outer ring (static layer) -->
      <line x1="0" y1="0" x2="85" y2="0" stroke="#7B2FFF" stroke-width="0.7" opacity="0.2"/>
      <line x1="0" y1="0" x2="-85" y2="0" stroke="#7B2FFF" stroke-width="0.7" opacity="0.2"/>
      <line x1="0" y1="0" x2="55" y2="0" stroke="#00C8FF" stroke-width="0.7" opacity="0.25"/>

      <!-- Central node -->
      <circle cx="0" cy="0" r="10" fill="#7B2FFF" opacity="0.8">
        <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="5" fill="#C840FF">
        <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
      </circle>

      <!-- Pulse rings -->
      <circle cx="0" cy="0" r="15" fill="none" stroke="#7B2FFF" stroke-width="1">
        <animate attributeName="r" values="15;95;15" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="15" fill="none" stroke="#9B4FFF" stroke-width="0.7">
        <animate attributeName="r" values="15;95;15" dur="4s" begin="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" begin="2s" repeatCount="indefinite"/>
      </circle>

      <!-- Data flow particles -->
      <circle r="2.5" fill="#C840FF" opacity="0.9">
        <animate attributeName="cx" values="0;85;0" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="0;0;0" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle r="2" fill="#00C8FF" opacity="0.9">
        <animate attributeName="cx" values="0;-55;0" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="0;0;0" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Graph labels -->
    <text x="502" y="238" fill="#9B4FFF" font-family="monospace" font-size="7" opacity="0.5">NODES: 847  |  EDGES: 2,341  |  CLUSTERS: 12</text>
  </g>

  <!-- CENTER CONNECTOR / CABLE -->
  <path d="M408,152 C428,152 438,152 450,152 C462,152 472,152 492,152" stroke="#1a3a5c" stroke-width="2" fill="none" stroke-dasharray="6,3" opacity="0.6"/>
  <circle cx="450" cy="152" r="4" fill="#00C8FF" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- BOTTOM LABEL -->
  <text x="450" y="308" text-anchor="middle" fill="#00C8FF" font-family="monospace" font-size="10" opacity="0.4" letter-spacing="4">TRISIEN AUTOMENCE // AI INFRASTRUCTURE</text>

  <!-- Corner decorations -->
  <path d="M20,20 L50,20 L50,22 L22,22 L22,50 L20,50 Z" fill="#00C8FF" opacity="0.3"/>
  <path d="M880,20 L850,20 L850,22 L878,22 L878,50 L880,50 Z" fill="#00C8FF" opacity="0.3"/>
  <path d="M20,300 L50,300 L50,298 L22,298 L22,270 L20,270 Z" fill="#00C8FF" opacity="0.3"/>
  <path d="M880,300 L850,300 L850,298 L878,298 L878,270 L880,270 Z" fill="#00C8FF" opacity="0.3"/>
</svg>
